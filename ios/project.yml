name: VertiBand
options:
  bundleIdPrefix: us.vertiband
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  VertiBand:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VertiBand
    resources:
      - path: VertiBand/Assets.xcassets
    info:
      path: VertiBand/Info.plist
      properties:
        CFBundleDisplayName: VertiBand
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMotionUsageDescription: "VertiBand reads your head orientation during the Epley maneuver to verify each stage in real time."
        NSLocalNetworkUsageDescription: "VertiBand can connect to a VertiBand hardware unit on your local Wi-Fi to drive audio cues."
        NSBonjourServices:
          - _http._tcp
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.vertiband.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VertiBand/Info.plist
