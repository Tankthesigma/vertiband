<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMin slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1A"/>
      <stop offset="1" stop-color="#13192A"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ED4E5"/>
      <stop offset="1" stop-color="#7BDDEB"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ED4E5"/>
      <stop offset="1" stop-color="#7BDDEB"/>
    </linearGradient>
    <style>
      .display { font-family: Georgia, "Times New Roman", serif; font-weight: 300; }
      .body { font-family: -apple-system, "SF Pro Text", Helvetica, Arial, sans-serif; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- Dark canvas -->
  <rect fill="url(#bg)" width="390" height="844"/>

  <!-- Starfield (hand-placed for consistency) -->
  <g fill="#FFFFFF">
    <circle cx="48" cy="62" r="0.8" opacity="0.22"/>
    <circle cx="134" cy="96" r="1.1" opacity="0.16"/>
    <circle cx="212" cy="44" r="0.6" opacity="0.28"/>
    <circle cx="298" cy="118" r="0.9" opacity="0.18"/>
    <circle cx="348" cy="72" r="0.7" opacity="0.2"/>
    <circle cx="72" cy="214" r="1" opacity="0.15"/>
    <circle cx="176" cy="744" r="0.8" opacity="0.24"/>
    <circle cx="260" cy="692" r="1.1" opacity="0.14"/>
    <circle cx="46" cy="604" r="0.7" opacity="0.2"/>
    <circle cx="340" cy="560" r="0.9" opacity="0.18"/>
    <circle cx="308" cy="808" r="1" opacity="0.22"/>
    <circle cx="116" cy="818" r="0.6" opacity="0.26"/>
    <circle cx="238" cy="176" r="0.8" opacity="0.15"/>
    <circle cx="58" cy="462" r="0.7" opacity="0.2"/>
    <circle cx="332" cy="316" r="1.2" opacity="0.16"/>
    <circle cx="154" cy="380" r="0.6" opacity="0.22"/>
    <circle cx="272" cy="432" r="0.8" opacity="0.18"/>
    <circle cx="88" cy="760" r="0.9" opacity="0.2"/>
  </g>

  <!-- Status bar -->
  <text class="body" x="32" y="30" font-size="15" font-weight="600" fill="#FFFFFF" opacity="0.85">9:41</text>
  <g fill="#FFFFFF" opacity="0.85">
    <rect x="348" y="18" width="22" height="10" rx="2.5" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <rect x="350" y="20" width="16" height="6" rx="1"/>
  </g>

  <!-- Top bar: close + phase label + step counter -->
  <circle cx="42" cy="88" r="18" fill="rgba(255,255,255,0.08)"/>
  <path d="M 36 82 L 48 94 M 48 82 L 36 94" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>

  <text class="mono" x="195" y="92" font-size="11" letter-spacing="2" font-weight="600" fill="rgba(255,255,255,0.72)" text-anchor="middle">HOLD STEADY</text>

  <text class="mono" x="340" y="92" font-size="12" font-weight="500" fill="#5ED4E5" text-anchor="end">03 <tspan fill="rgba(255,255,255,0.5)">/ 05</tspan></text>

  <!-- Step label -->
  <text class="mono" x="195" y="206" font-size="11" letter-spacing="2" font-weight="600" fill="#5ED4E5" text-anchor="middle">STEP 3 OF 5</text>

  <!-- Instruction -->
  <text class="display" x="195" y="258" font-size="26" letter-spacing="-0.3" fill="#FFFFFF" text-anchor="middle">Rotate your head 90</text>
  <text class="display" x="195" y="292" font-size="26" letter-spacing="-0.3" fill="#FFFFFF" text-anchor="middle">degrees to the left.</text>

  <!-- Angle ring -->
  <circle cx="195" cy="470" r="118" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
  <circle cx="195" cy="470" r="118" fill="none" stroke="url(#ring)" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="741" stroke-dashoffset="185"
          transform="rotate(-90 195 470)"/>

  <!-- Ring center -->
  <text class="display" x="195" y="482" font-size="72" font-weight="500" letter-spacing="-2.4" fill="#FFFFFF" text-anchor="middle">72°</text>
  <text class="mono" x="195" y="512" font-size="11" letter-spacing="1.4" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="middle">TARGET 90°</text>

  <!-- Phase meter -->
  <text class="mono" x="32" y="652" font-size="11" letter-spacing="1.6" font-weight="600" fill="rgba(255,255,255,0.72)">HOLD</text>
  <text class="mono" x="358" y="652" font-size="12" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="end">18 of 30 s</text>

  <rect x="32" y="664" width="326" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="32" y="664" width="196" height="8" rx="4" fill="url(#bar)"/>

  <!-- Voice guidance line -->
  <circle cx="38" cy="728" r="4" fill="#5ED4E5"/>
  <text class="body" x="52" y="732" font-size="14" fill="rgba(255,255,255,0.88)">Good, hold still</text>

  <!-- Secondary cue -->
  <circle cx="38" cy="758" r="4" fill="#5ED4E5" opacity="0.5"/>
  <text class="body" x="52" y="762" font-size="14" fill="rgba(255,255,255,0.55)">Five seconds remaining</text>

  <!-- Home indicator -->
  <rect x="135" y="822" width="120" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>
</svg>
