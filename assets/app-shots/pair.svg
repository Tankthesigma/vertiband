<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMin slice">
  <defs>
    <linearGradient id="probBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C85A3A"/>
      <stop offset="1" stop-color="#F7D3B0"/>
    </linearGradient>
    <style>
      .paper { fill: #F7F1E8; }
      .canvas { fill: #FFFFFF; }
      .ink { fill: #1D2C38; }
      .ink2 { fill: #243443; }
      .fg2 { fill: #4A5A68; }
      .fg3 { fill: #8A8372; }
      .signal { fill: #C85A3A; }
      .hair-stroke { stroke: rgba(29,44,56,0.10); fill: none; }
      .hair-fill { fill: rgba(29,44,56,0.06); }
      .display { font-family: Georgia, "Times New Roman", serif; font-weight: 300; }
      .display-i { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 400; }
      .body { font-family: -apple-system, "SF Pro Text", Helvetica, Arial, sans-serif; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="paper" width="390" height="844"/>

  <!-- Status bar -->
  <text class="body" x="32" y="28" font-size="15" font-weight="600" fill="#1D2C38">9:41</text>
  <g fill="#1D2C38" opacity="0.85">
    <circle cx="310" cy="24" r="3"/>
    <rect x="318" y="22" width="3" height="5" rx="0.5"/>
    <rect x="324" y="19" width="3" height="8" rx="0.5"/>
    <rect x="330" y="16" width="3" height="11" rx="0.5"/>
    <rect x="348" y="18" width="22" height="10" rx="2.5" fill="none" stroke="#1D2C38" stroke-width="1"/>
    <rect x="350" y="20" width="15" height="6" rx="1"/>
  </g>

  <!-- Close button -->
  <text class="body" x="32" y="78" font-size="15" font-weight="500" fill="#4A5A68">Close</text>

  <!-- Chapter eyebrow -->
  <rect x="24" y="118" width="24" height="1" class="signal"/>
  <text class="mono" x="56" y="122" font-size="11" letter-spacing="2.4" font-weight="600" fill="#8A8372">SESSION COMPLETE</text>

  <!-- Editorial headline -->
  <text class="display" x="24" y="184" font-size="52" letter-spacing="-1.4" fill="#1D2C38">Nicely</text>
  <text class="display-i" x="24" y="234" font-size="52" letter-spacing="-1.4" fill="#243443">done.</text>

  <!-- VertiScore card -->
  <rect x="20" y="266" width="350" height="144" rx="16" class="canvas" stroke="rgba(29,44,56,0.10)" stroke-width="1"/>
  <text class="mono" x="38" y="294" font-size="11" letter-spacing="2.4" font-weight="600" fill="#8A8372">VERTISCORE</text>

  <text class="display" x="38" y="378" font-size="88" font-weight="600" letter-spacing="-2.6" fill="#1D2C38">87</text>

  <text class="mono" x="238" y="318" font-size="10" letter-spacing="1.4" font-weight="600" fill="#8A8372">GRADE</text>
  <text class="display" x="238" y="358" font-size="36" font-weight="500" letter-spacing="-0.8" fill="#C85A3A">A</text>
  <text class="body" x="238" y="380" font-size="12" fill="#4A5A68">Textbook.</text>

  <rect x="38" y="398" width="314" height="1" class="hair-fill"/>

  <!-- Recovery probability card -->
  <rect x="20" y="428" width="350" height="110" rx="16" class="canvas" stroke="rgba(29,44,56,0.10)" stroke-width="1"/>
  <text class="mono" x="38" y="456" font-size="11" letter-spacing="2.4" font-weight="600" fill="#8A8372">RECOVERY PROBABILITY</text>
  <text class="display" x="38" y="504" font-size="42" font-weight="500" letter-spacing="-1" fill="#1D2C38">78%</text>
  <text class="body" x="350" y="504" font-size="12" fill="#8A8372" text-anchor="end">1 more session likely.</text>

  <rect x="38" y="516" width="314" height="8" rx="4" fill="rgba(29,44,56,0.06)"/>
  <rect x="38" y="516" width="245" height="8" rx="4" fill="url(#probBar)"/>

  <!-- Clinical note card -->
  <rect x="20" y="558" width="350" height="242" rx="16" class="canvas" stroke="rgba(29,44,56,0.10)" stroke-width="1"/>
  <text class="mono" x="38" y="586" font-size="11" letter-spacing="2.4" font-weight="600" fill="#8A8372">CLINICAL NOTE  ·  AI</text>

  <text class="body" x="38" y="612" font-size="13" fill="#4A5A68">A steady, well-paced session. Most poses</text>
  <text class="body" x="38" y="630" font-size="13" fill="#4A5A68">locked in on the first try and you carried</text>
  <text class="body" x="38" y="648" font-size="13" fill="#4A5A68">them through the hold without drifting out.</text>

  <text class="body" x="38" y="682" font-size="13" fill="#4A5A68">Step 3 was the loosest — only 72% of that</text>
  <text class="body" x="38" y="700" font-size="13" fill="#4A5A68">hold stayed inside tolerance. Slow the move</text>
  <text class="body" x="38" y="718" font-size="13" fill="#4A5A68">into that position and settle before the timer.</text>

  <text class="body" x="38" y="752" font-size="13" fill="#4A5A68" font-weight="600">Next:</text>
  <text class="body" x="74" y="752" font-size="13" fill="#4A5A68">Plan one more session tomorrow.</text>
  <text class="body" x="38" y="770" font-size="13" fill="#4A5A68">Keep your head upright 10 minutes after.</text>

  <!-- Done button -->
  <rect x="20" y="812" width="350" height="20" rx="0" fill="none"/>

  <!-- Home indicator -->
  <rect x="135" y="822" width="120" height="4" rx="2" fill="#1D2C38" opacity="0.35"/>
</svg>
